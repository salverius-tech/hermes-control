# Establish the physical-device WebSocket baseline for disposable loopback validation.
appId: com.anonymous.hermesmobilecontrol
---
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: "header-settings"
    timeout: 8000
- tapOn:
    id: "header-settings"
- extendedWaitUntil:
    visible:
      id: "settings-api-url"
    timeout: 5000
- tapOn:
    id: "settings-api-url"
- eraseText
- inputText: ${API_URL}
- tapOn:
    id: "settings-api-token"
- eraseText
- inputText: ${DEVICE_TOKEN}
- hideKeyboard
- tapOn:
    id: "settings-save"
- assertVisible:
    id: "settings-save-message"
- scrollUntilVisible:
    element:
      text: "WebSocket"
    direction: DOWN
- extendedWaitUntil:
    visible: "connected"
    timeout: 15000
- assertVisible: "connected"
- pressKey: back
- extendedWaitUntil:
    visible:
      id: "header-settings"
    timeout: 8000
