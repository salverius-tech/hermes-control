# Assert the current real socket state after a fixture-controlled disconnect.
# Start this flow only after p7-websocket-connection.yaml saved fixture settings,
# then run `device_sandbox.py disconnect` against the same loopback server.
appId: com.anonymous.hermesmobilecontrol
---
- launchApp
- tapOn:
    id: "header-settings"
- assertVisible: "Settings"
- assertVisible: "Connection state"
- assertVisible: "WebSocket"
- assertVisible: "Reconnects"
- extendedWaitUntil:
    visible: ${WEBSOCKET_STATE}
    timeout: 8000
- assertVisible: ${WEBSOCKET_RECONNECTS}