name: verify

on:
  pull_request:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build and upload Android release APK artifact'
        required: false
        default: false
        type: boolean

jobs:
  backend-and-mobile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - name: Enable pnpm
        run: corepack enable
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: pnpm install --frozen-lockfile
      - name: Run canonical verifier
        run: python scripts/verify.py
      - name: Set up Java for Android artifact build
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_android }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build Android release APK artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_android }}
        run: python scripts/verify.py --android
      - name: Upload Android release APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_android }}
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-control-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
